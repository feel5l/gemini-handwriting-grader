name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "marking_form/**"
      - "images/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble site
        run: |
          mkdir -p _site

          # Landing page (docs/)
          cp -r docs/. _site/

          # Project images used by the landing page
          if [ -d images ]; then
            cp -r images _site/images
          fi

          # Generated marking form (present when committed after running notebooks)
          if [ -d marking_form ]; then
            cp -r marking_form _site/marking_form
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
